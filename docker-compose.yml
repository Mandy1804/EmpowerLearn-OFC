services:
  postgres:
    image: postgres:16
    container_name: empowerlearn-postgres
    environment:
      POSTGRES_USER: empowerlearn
      POSTGRES_PASSWORD: empowerlearn123
      POSTGRES_DB: empowerlearn
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: empowerlearn-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: empowerlearn-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: empowerlearn
      RABBITMQ_DEFAULT_PASS: empowerlearn123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq